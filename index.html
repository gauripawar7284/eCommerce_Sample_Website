<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flipkart Clone</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f1f3f6;
      }

      /* HEADER */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #fff;
        padding: 10px 20px;
        gap: 20px;
      }

      .header input {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
      }

      .header-links {
        display: flex;
        gap: 20px;
      }

      /* CATEGORY BAR */
      .categories {
        display: flex;
        justify-content: space-between;
        padding: 15px;
        background: #fff;
        flex-wrap: wrap;
      }

      .cat {
        text-align: center;
        font-size: 14px;
        cursor: pointer;
      }

      /* BANNER */
      .banner {
        display: flex;
        justify-content: center;
        padding: 20px;
      }

      .coupon {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(to right, purple, violet);
        color: white;
        padding: 30px;
        border-radius: 10px;
        width: 90%;
      }

      .offer button {
        padding: 10px 15px;
        border: none;
        background: white;
        color: purple;
        border-radius: 5px;
        cursor: pointer;
      }

      /* PRODUCTS */
      .products {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        padding: 20px;
        height: 800px;
      }

      .card {
        flex: 0 0 calc(32% - 20px); /* tile width (4 per row) */
        height: 320px;
        background: #ddd;
        border-radius: 12px;
        overflow: hidden;

        display: flex;
        flex-direction: column;
        justify-content: space-around;
        padding: 10px;
      }

      .card-title {
        text-align: center;
        font-size: 16px;
      }

      .product_images {
        width: 100%;
        height: 100%;
        object-fit: cover; /* keeps image nicely fitted */
      }

      /* MAIN WRAPPER (same alignment as header) */
      .main-container {
        max-width: 1200px; /* adjust like Flipkart */
        margin: 0 auto; /* 🔥 centers horizontally */
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="main-container">
      <header class="header">
        <div class="logo">Flipkart</div>
        <input type="text" placeholder="Search for Products, Brands and More" />

        <div class="header-links">
          <span>Login</span>
          <span>More</span>
          <span>Cart</span>
        </div>
      </header>

      <!-- CATEGORY BAR -->
      <section class="categories">
        <div class="cat">For You</div>
        <div class="cat">Fashion</div>
        <div class="cat">Mobiles</div>
        <div class="cat">Beauty</div>
        <div class="cat">Electronics</div>
        <div class="cat">Home</div>
        <div class="cat">Appliances</div>
        <div class="cat">Toys</div>
        <div class="cat">Food</div>
        <div class="cat">Sports</div>
        <div class="cat">Books</div>
        <div class="cat">Furniture</div>
      </section>

      <!-- BANNER -->
      <section class="banner">
        <div class="coupon">
          <h2>Exclusive coupon for you!</h2>
          <div class="offer">
            <h3>Flat 10% Off</h3>
            <p>Up to ₹100</p>
            <button>Already applied</button>
          </div>
        </div>
      </section>

      <!-- PRODUCTS -->

      <section class="products">
        <div class="card">
          <img
            src="https://media.fashionnetwork.com/cdn-cgi/image/fit=contain,width=1000,height=1000/m/b590/7f16/bcae/72ea/858c/8362/45e5/8276/997a/162d/162d.png"
            alt="Product1"
            class="product_images"
          />
          <h2 class="card-title">Min. 70% Off</h2>
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://www.tidio.com/wp-content/uploads/packaging-examples_optimized-1200x1022-1-1.png"
            alt="product1"
          />
          <h2 class="card-title">From $26459</h2>
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://i.pinimg.com/1200x/12/d3/e6/12d3e661c30b3ddc19d5f80c1b50963a.jpg"
            alt="product2"
          />
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://packaginghub.com/wp-content/uploads/2023/06/Types-of-Product-Packaging.webp"
            alt="product3"
          />
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://www.tidio.com/wp-content/uploads/packaging-examples_optimized-1200x1022-1-1.png"
            alt="product4"
          />
          <h2 class="card-title">Special Offeres</h2>
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://i.pinimg.com/1200x/12/d3/e6/12d3e661c30b3ddc19d5f80c1b50963a.jpg"
            alt="product5"
          />
          <h2 class="card-title">New Collection</h2>
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://www.tidio.com/wp-content/uploads/packaging-examples_optimized-1200x1022-1-1.png"
            alt="product6"
          />
          <h2 class="card-title">Min. 50% OFF</h2>
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://i.pinimg.com/1200x/2e/5c/c7/2e5cc748c257d304b7cf586c2c558059.jpg"
            alt="product7"
          />
          <h2 class="card-title">Min. 50% OFF</h2>
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://i.pinimg.com/1200x/2e/5c/c7/2e5cc748c257d304b7cf586c2c558059.jpg"
            alt="product8"
          />
          <h2 class="card-title">Special Offeres</h2>
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://packaginghub.com/wp-content/uploads/2023/06/Types-of-Product-Packaging.webp"
            alt="product9"
          />
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://i.pinimg.com/736x/89/ac/78/89ac7841d71b268c291db5110f1075a7.jpg"
            alt="product10"
          />
        </div>
        <div class="card">
          <img
            class="product_images"
            src="https://www.tidio.com/wp-content/uploads/packaging-examples_optimized-1200x1022-1-1.png"
            alt="product11"
          />
        </div>
      </section>
    </div>
  </body>
</html>
